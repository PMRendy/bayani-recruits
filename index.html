/* ===== Free in-browser resume extraction + rule-based screening ===== */
async function extractPdfText(file) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(buf) }).promise;
  let text = "";
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    text += content.items.map(i => i.str).join(" ") + "\n";
  }
  return text.replace(/[ \t]+/g, " ").trim();
}

const SCREEN_RULES = {
  vaBpo: ["virtual assistant"," va ","bpo","call center","call centre","customer service","customer support","csr","tsr","telemarket","appointment sett","cold call","inbound","outbound","healthcare account","medical va","executive assistant","ecommerce va","amazon va","chat support","email support"],

  bonus: ["night shift","graveyard","us client","us-based","us based","eastern time","est ","pst ","healthcare","medical billing","insurance verification","slack","clickup","asana","trello","salesforce","hubspot","zendesk","crm","data entry","quickbooks","calendar management","email management","cold email","lead generation","google workspace","microsoft office","excel","canva","shopify","wordpress"],
  eduSignals: ["bachelor","bs ","ba ","college","university","graduate","degree","course","certificate","certification","training"],
  anyWork: ["experience","employed","worked at","work history","company","position","responsibilities","duties","intern"],
};
// Common job title words para mahagilap ang work history lines
const TITLE_WORDS = ["assistant","representative","specialist","agent","associate","officer","coordinator","manager","supervisor","lead","analyst","support","staff","clerk","encoder","teacher","tutor","nurse","cashier","freelancer","consultant","intern","developer","designer","admin","secretary","receptionist"];

function analyzeResume(text, expText) {
  const raw = (text || "") + "\n" + (expText || "");
  const t = (" " + raw + " ").toLowerCase();
  const vaHits = SCREEN_RULES.vaBpo.filter(k => t.includes(k));
  const transferHits = SCREEN_RULES.transferable.filter(k => t.includes(k));
  const bonusHits = SCREEN_RULES.bonus.filter(k => t.includes(k));
  const eduHits = SCREEN_RULES.eduSignals.filter(k => t.includes(k));
  const hasWork = SCREEN_RULES.anyWork.some(k => t.includes(k));

  // Hulaan ang years of experience mula sa year ranges (e.g. 2019-2023, 2021 to present)
  let expYears = 0;
  const ranges = raw.match(/(20[0-2][0-9])\s*(?:-|–|to)\s*(20[0-2][0-9]|present|current|now)/gi) || [];
  const thisYear = new Date().getFullYear();
  for (const r of ranges) {
    const m = r.match(/(20[0-2][0-9])\s*(?:-|–|to)\s*(20[0-2][0-9]|present|current|now)/i);
    if (m) {
      const from = parseInt(m[1]);
      const to = /present|current|now/i.test(m[2]) ? thisYear : parseInt(m[2]);
      if (to >= from && to - from < 30) expYears += (to - from);
    }
  }
  expYears = Math.min(expYears, 25);

  // Hagilapin ang mukhang job-title/work-history lines para sa Experience snapshot
  const lines = raw.split(/\n|(?=\s{3,})/).map(s => s.trim()).filter(s => s.length > 5 && s.length < 120);
  const roleLines = [];
  for (const line of lines) {
    const l = line.toLowerCase();
    const hasTitle = TITLE_WORDS.some(w => l.includes(w));
    const hasYear = /20[0-2][0-9]/.test(line);
    if (hasTitle && (hasYear || roleLines.length < 3)) {
      if (!roleLines.some(x => x.toLowerCase() === l)) roleLines.push(line);
    }
    if (roleLines.length >= 6) break;
  }

  // Scoring: VA/BPO pinakamataas, pero may kabuhayan din ang transferable experience
  let score = 10;
  score += Math.min(vaHits.length * 12, 44);
  score += Math.min(transferHits.length * 5, 20);
  score += Math.min(bonusHits.length * 3, 18);
  score += Math.min(expYears * 2, 12);
  if (eduHits.length) score += 3;
  if (hasWork) score += 3;
  score = Math.min(Math.round(score), 100);

  let category = "No Experience";
  if (vaHits.length > 0) category = "With VA/BPO Experience";
  else if (transferHits.length > 0 || hasWork) category = "With Other Work Experience";

  const flags = [];
  if (roleLines.length) flags.push("Roles found: " + roleLines.slice(0, 4).join(" | "));
  if (vaHits.length) flags.push("VA/BPO signals: " + vaHits.slice(0, 4).map(s => s.trim()).join(", "));
  if (transferHits.length) flags.push("Transferable: " + transferHits.slice(0, 5).map(s => s.trim()).join(", "));
  if (bonusHits.length) flags.push("Priority skills: " + bonusHits.slice(0, 5).map(s => s.trim()).join(", "));
  if (!text && expText) flags.push("No resume attached — self-described only");
  if ((text || "").length < 300 && text) flags.push("Very short resume — verify");

  const summary = category
    + (expYears ? " · ~" + expYears + " yr(s) est. experience" : "")
    + " · " + vaHits.length + " VA/BPO, " + transferHits.length + " transferable, " + bonusHits.length + " priority skill match(es)."
    + " Keyword-based screen — open the full resume text below to verify.";

  return { score, category, summary, flags };
}
function scoreWrittenLocal(answer, minWords) {
  const a = (answer || "").trim();
  if (!a) return 0;
  const words = a.split(/\s+/).length;
  let s = 3;
  s += Math.min(words / (minWords || 20) * 3, 4);
  if (/^[A-Z]/.test(a)) s += 1;
  if (/[.!?]$/.test(a)) s += 1;
  if (words >= 15 && /,/.test(a)) s += 1;
  return Math.min(Math.round(s * 10) / 10, 10);
}

async function askClaude(prompt, maxTokens = 1000, pdfB64 = null) {
  const msgs = pdfB64 ? [{
    role: "user",
    content: [{
      type: "document",
      source: {
        type: "base64",
        media_type: "application/pdf",
        data: pdfB64
      }
    }, {
      type: "text",
      text: prompt
    }]
  }] : [{
    role: "user",
    content: prompt
  }];
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      messages: msgs
    })
  });
  const d = await r.json();
  return (d.content || []).filter(c => c.type === "text").map(c => c.text).join("\n");
}
