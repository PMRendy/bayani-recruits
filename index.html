/* ===== Free in-browser resume extraction + rule-based screening ===== */
async function extractPdfText(file) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(buf) }).promise;

    const page = await pdf.getPage(p);

    text += content.items.map(i => i.str).join(" ") + "\n";
  }

}

// Keyword rules — dagdagan/bawasan mo lang dito para i-tune ang scoring
const SCREEN_RULES = {
  vaBpo: ["virtual assistant"," va ","bpo","call center","call centre","customer service","customer support","csr","tsr","telemarket","appointment sett","cold call","inbound","outbound","healthcare account","medical va","executive assistant","ecommerce va","amazon va"],
  bonus: ["night shift","graveyard","us client","us-based","us based","eastern time","est ","pst ","healthcare","medical billing","insurance verification","slack","clickup","asana","trello","salesforce","hubspot","zendesk","crm","data entry","quickbooks","calendar management","email management","cold email","lead generation"],
  anyWork: ["experience","employed","worked at","work history","company","position","responsibilities","duties","intern"],
};
function analyzeResume(text, expText) {
  const t = (" " + (text || "") + " " + (expText || "") + " ").toLowerCase();
  const vaHits = SCREEN_RULES.vaBpo.filter(k => t.includes(k));
  const bonusHits = SCREEN_RULES.bonus.filter(k => t.includes(k));
  const hasWork = SCREEN_RULES.anyWork.some(k => t.includes(k));
  const yearMatches = (t.match(/20[0-2][0-9]/g) || []).length;
  let score = 10;
  score += Math.min(vaHits.length * 12, 48);
  score += Math.min(bonusHits.length * 4, 28);
  if (hasWork) score += 8;
  score += Math.min(yearMatches, 6);
  score = Math.min(Math.round(score), 100);
  let category = "No Experience";
  if (vaHits.length > 0) category = "With VA/BPO Experience";
  else if (hasWork) category = "With Other Work Experience";
  const flags = [];
  if (vaHits.length) flags.push("VA/BPO signals: " + vaHits.slice(0, 4).map(s=>s.trim()).join(", "));
  if (bonusHits.length) flags.push("Priority skills: " + bonusHits.slice(0, 5).map(s=>s.trim()).join(", "));
  if (!text && expText) flags.push("No resume attached — self-described only");
  if ((text || "").length < 300 && text) flags.push("Very short resume — verify");
  const summary = category + " · matched " + vaHits.length + " VA/BPO keyword(s) and " + bonusHits.length + " priority skill(s). Keyword-based screen — open the full resume text below to verify.";
  return { score, category, summary, flags };
}
function scoreWrittenLocal(answer, minWords) {
  const a = (answer || "").trim();
  if (!a) return 0;
  const words = a.split(/\s+/).length;
  let s = 3;
  s += Math.min(words / (minWords || 20) * 3, 4);
  if (/^[A-Z]/.test(a)) s += 1;
  if (/[.!?]$/.test(a)) s += 1;
  if (words >= 15 && /,/.test(a)) s += 1;
  return Math.min(Math.round(s * 10) / 10, 10);
}

    method: "POST",
    headers: {
      "Content-Type": "application/json"

    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      messages: msgs

  });

  return (d.content || []).filter(c => c.type === "text").map(c => c.text).join("\n");
}
